<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile Autofill Demo</title>
    <style>
      body {
        margin: 0;
        background: linear-gradient(180deg, #f4efe6 0%, #fffdf8 100%);
        color: #1b1b18;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px 60px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
      }

      h2 {
        margin: 32px 0 0;
        font-size: 22px;
      }

      p {
        color: #57534e;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 18px;
        margin-top: 28px;
        padding: 24px;
        border: 1px solid #ded7ca;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 16px 50px rgba(30, 41, 59, 0.08);
      }

      .row {
        display: grid;
        gap: 8px;
      }

      .double {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        font-weight: 700;
      }

      input,
      select,
      textarea {
        border: 1px solid #cfc7ba;
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        background: white;
      }

      button {
        justify-self: start;
        border: 0;
        border-radius: 12px;
        padding: 12px 18px;
        background: #1f2937;
        color: white;
        font: inherit;
        font-weight: 700;
      }

      textarea {
        min-height: 120px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>자동완성 데모 폼</h1>
      <p>확장프로그램을 로드한 뒤 아래 입력칸이나 선택칸을 클릭하면 저장된 프로필 값을 추천받을 수 있습니다.</p>

      <h2>로그인 폼 - 추천 제외 대상</h2>
      <form action="/login" class="login-panel">
        <div class="row">
          <label for="loginEmail">로그인 이메일</label>
          <input id="loginEmail" name="login_email" type="email" autocomplete="username" placeholder="email@example.com">
        </div>

        <div class="row">
          <label for="loginPassword">비밀번호</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password">
        </div>

        <button type="submit">로그인</button>
      </form>

      <h2>일반 프로필 폼 - 추천 대상</h2>
      <form>
        <div class="row">
          <label for="receiverName">받는 사람 이름</label>
          <input id="receiverName" name="receiver_name" placeholder="이름">
        </div>

        <div class="row">
          <label for="contactEmail">이메일 주소</label>
          <input id="contactEmail" name="contact_email" type="email" autocomplete="section-shipping shipping email" placeholder="name@example.com">
        </div>

        <div class="double">
          <div class="row">
            <label for="mobilePhone">휴대폰 번호</label>
            <input id="mobilePhone" name="mobile_phone" type="tel" placeholder="010-0000-0000">
          </div>

          <div class="row">
            <label for="carrier">통신사</label>
            <select id="carrier" name="mobile_carrier">
              <option value="">통신사</option>
              <option value="SKT">SKT</option>
              <option value="KT">KT</option>
              <option value="LGU+">LGU+</option>
            </select>
          </div>
        </div>

        <div class="double">
          <div class="row">
            <label for="mobilePhoneTail">휴대폰 번호 분리 입력</label>
            <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px;">
              <select name="mobile_prefix" aria-label="휴대폰 앞자리">
                <option value="010" selected>010</option>
                <option value="011">011</option>
                <option value="016">016</option>
                <option value="017">017</option>
              </select>
              <input id="mobilePhoneTail" name="mobile_phone_tail" type="tel" placeholder="뒤 8자리">
            </div>
          </div>

          <div class="row">
            <label for="gender">성별</label>
            <select id="gender" name="gender">
              <option value="">성별</option>
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
          </div>
        </div>

        <div class="row">
          <label for="birthDate">생년월일</label>
          <input id="birthDate" name="birth_date" type="date" autocomplete="bday" min="1900-01-01" max="9999-12-31">
        </div>

        <div class="row">
          <label for="companyName">회사명</label>
          <input id="companyName" name="company_name" placeholder="회사명">
        </div>

        <div class="row">
          <label for="zipCode">우편번호</label>
          <input id="zipCode" name="zip_code" autocomplete="postal-code" placeholder="06236">
        </div>

        <div class="row">
          <label for="shippingAddress">배송지 주소</label>
          <input id="shippingAddress" name="shipping_address" autocomplete="street-address" placeholder="서울시 강남구...">
        </div>

        <div class="row">
          <label for="addressDetail">상세주소</label>
          <input id="addressDetail" name="address_detail" autocomplete="address-line2" placeholder="101동 902호">
        </div>

        <div class="row">
          <span id="invoiceEmailLabel"><strong>세금계산서 이메일</strong></span>
          <input id="invoiceEmail" name="invoiceEmail" type="email" aria-labelledby="invoiceEmailLabel" placeholder="billing@example.com">
        </div>

        <div class="row">
          <label for="memo">배송 메모</label>
          <textarea id="memo" name="memo" placeholder="이 칸은 자동완성 대상이 아닙니다."></textarea>
        </div>
      </form>
    </main>
  </body>
</html>
